 <!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>헌법·행정법 일반론 빈칸 채우기</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="#" class="brand">
        <div class="brand-eyebrow">2026 변시 대비</div>
        <div class="brand-title">헌법·행정법 일반론 빈칸 채우기</div>
      </a>
      <div class="auth">
        <button id="login-btn" class="btn-login">Google 로그인</button>
        <div id="user-info" style="display:none">
          <span id="user-name"></span>
          <button id="logout-btn" class="btn-secondary">로그아웃</button>
        </div>
      </div>
    </div>
  </header>

  <!-- 홈 -->
  <main id="home-view" class="container">
    <div class="page-eyebrow">SECTIONS</div>
    <h1 class="page-title">학습할 섹션 선택</h1>
    <p class="page-desc">각 섹션을 클릭하면 빈칸 채우기 학습을 시작할 수 있어요. 로그인하면 마지막 학습일이 기기간 자동 동기화됩니다.</p>
    <div class="category-tabs">
      <button class="category-tab active" data-category="심사기준">심사기준</button>
      <button class="category-tab" data-category="기본권의 보호영역">기본권의 보호영역</button>
    </div>
    <div id="section-list" class="section-list"></div>
  </main>

  <!-- 섹션 페이지 -->
  <main id="section-view" class="container" style="display:none">
    <a href="#" class="back-link">← 섹션 목록</a>
    <div id="last-study-bar" class="last-study-bar"></div>
    <header class="section-header">
      <div class="page-eyebrow" id="section-category"></div>
      <h1 class="page-title" id="section-title"></h1>
    </header>
    <div class="mode-bar">
      <span class="mode-label">난이도</span>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="1">1단계 · 키워드</button>
        <button class="mode-btn" data-mode="2">2단계 · 전체 작성</button>
      </div>
      <span class="mode-desc" id="mode-desc">핵심 키워드만 빈칸으로 채우는 모드</span>
    </div>
    <div id="cards-container" class="cards-container"></div>
  </main>

  <!-- 푸터 (섹션 페이지에서만) -->
  <footer id="footer" class="footer" style="display:none">
    <div class="footer-inner">
      <div>
        <div class="score-display">
          <span id="score-label">정답</span> <span class="score-num" id="score">0</span>/<span class="score-num" id="total">0</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      </div>
      <div id="footer-actions" class="footer-actions"></div>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
